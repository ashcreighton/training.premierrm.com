<script>
    const video = document.getElementById('orientationVideo');
    const loadingText = document.getElementById('loadingText');
    const bufferProgress = document.getElementById('bufferProgress');
    const progressBarFill = document.getElementById('progressBarFill');
    const redirectMessage = document.getElementById('redirectMessage');
    const countdownElement = document.getElementById('countdown');
    const jotformUrl = 'https://form.jotform.com/260404412904043';

    let maxWatchedTime = 0;

    /* ----------------------------
       BUFFER PROGRESS (Stable)
    -----------------------------*/
    function updateBufferProgress() {
        if (video.duration > 0 && video.buffered.length > 0) {
            const bufferedEnd = video.buffered.end(video.buffered.length - 1);
            const percentBuffered = Math.min(
                Math.round((bufferedEnd / video.duration) * 100),
                100
            );

            bufferProgress.textContent = percentBuffered + '%';
            progressBarFill.style.width = percentBuffered + '%';
        }
    }

    video.addEventListener('progress', updateBufferProgress);
    video.addEventListener('loadedmetadata', updateBufferProgress);
    video.addEventListener('loadeddata', updateBufferProgress);

    /* ----------------------------
       LOADING STATES
    -----------------------------*/
    video.addEventListener('loadeddata', function () {
        loadingText.style.display = 'none';
    });

    video.addEventListener('waiting', function () {
        loadingText.style.display = 'block';
    });

    video.addEventListener('playing', function () {
        loadingText.style.display = 'none';
    });

    video.addEventListener('error', function () {
        loadingText.style.display = 'block';
        loadingText.innerHTML = '<div style="color:#ff4444;">Error loading video. Please check your connection and try again.</div>';
    });

    /* ----------------------------
       TRACK WATCH PROGRESS
    -----------------------------*/
    video.addEventListener('timeupdate', function () {
        if (video.currentTime > maxWatchedTime) {
            maxWatchedTime = video.currentTime;
        }
    });

    /* ----------------------------
       SAFE SKIP PREVENTION
       (Prevents real skipping but
        allows tiny browser seeks)
    -----------------------------*/
    video.addEventListener('seeking', function () {
        if (video.currentTime > maxWatchedTime + 0.5) {
            video.currentTime = maxWatchedTime;
        }
    });

    /* ----------------------------
       REDIRECT WHEN COMPLETE
    -----------------------------*/
    video.addEventListener('ended', function () {
        redirectMessage.classList.add('show');

        let countdown = 3;
        const countdownInterval = setInterval(function () {
            countdown--;
            countdownElement.textContent = countdown;

            if (countdown <= 0) {
                clearInterval(countdownInterval);
                window.location.href = jotformUrl;
            }
        }, 1000);
    });
</script>
